spring.application.name=career-gateway-backend

# Database Configuration
# On Render: DATABASE_URL contains full PostgreSQL connection string (jdbc:postgresql://user:pass@host:port/db)
# Locally: falls back to MySQL
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/gateway_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root123}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}

# Server config
server.port=${PORT:8080}
