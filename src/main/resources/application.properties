spring.application.name=career-gateway-backend

# Database Configuration
# The entrypoint.sh script sets SPRING_DATASOURCE_URL/USERNAME/PASSWORD
# These Spring Boot properties take priority over application.properties
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/gateway_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}

# Server config
server.port=${PORT:8080}
