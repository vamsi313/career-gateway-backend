spring.application.name=career-gateway-backend

# Database Configuration (uses env vars on Railway, falls back to local MySQL)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/gateway_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server config
server.port=${PORT:8080}
