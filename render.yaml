databases:
  - name: career-gateway-db
    databaseName: gateway_db
    user: gateway_user
    plan: free
    region: oregon

services:
  - type: web
    name: career-gateway-backend
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: career-gateway-db
          property: connectionString
      - key: PORT
        value: 8080
